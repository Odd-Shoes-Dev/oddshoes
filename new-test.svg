<svg width="200" height="200" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle border -->
  <circle cx="50" cy="50" r="42" stroke="#e05a3a" stroke-width="2"/>

  <!-- Calendar body -->
  <rect x="32" y="38" width="36" height="32" rx="2" stroke="#e05a3a" stroke-width="2" fill="none"/>
  
  <!-- Calendar header (darker stripe) -->
  <rect x="32" y="38" width="36" height="8" fill="#e05a3a" fill-opacity="0.15"/>
  <line x1="32" y1="46" x2="68" y2="46" stroke="#e05a3a" stroke-width="2"/>
  
  <!-- Binding rings -->
  <line x1="40" y1="34" x2="40" y2="42" stroke="#e05a3a" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="34" x2="50" y2="42" stroke="#e05a3a" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="34" x2="60" y2="42" stroke="#e05a3a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Calendar grid dots (representing dates) -->
  <circle cx="38" cy="52" r="1.5" fill="#e05a3a"/>
  <circle cx="44" cy="52" r="1.5" fill="#e05a3a"/>
  <circle cx="50" cy="52" r="1.5" fill="#e05a3a"/>
  <circle cx="56" cy="52" r="1.5" fill="#e05a3a"/>
  <circle cx="62" cy="52" r="1.5" fill="#e05a3a"/>
  
  <circle cx="38" cy="58" r="1.5" fill="#e05a3a"/>
  <circle cx="44" cy="58" r="1.5" fill="#e05a3a"/>
  <circle cx="50" cy="58" r="1.5" fill="#e05a3a"/>
  <circle cx="56" cy="58" r="1.5" fill="#e05a3a"/>
  <circle cx="62" cy="58" r="1.5" fill="#e05a3a"/>
  
  <circle cx="38" cy="64" r="1.5" fill="#e05a3a"/>
  <circle cx="44" cy="64" r="1.5" fill="#e05a3a"/>
  <circle cx="50" cy="64" r="1.5" fill="#e05a3a"/>
  <circle cx="56" cy="64" r="1.5" fill="#e05a3a"/>
  <circle cx="62" cy="64" r="1.5" fill="#e05a3a"/>
</svg>